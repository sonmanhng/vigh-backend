services:
  - type: web
    name: vigh-backend
    runtime: node
    buildCommand: npm install && npx prisma generate && cd frontend && npm install && npm run build && cd ..
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
